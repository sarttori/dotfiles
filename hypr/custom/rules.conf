# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# ######## Window rules ########

# apply global transparency to all windows
#windowrule = opacity 0.89 override 0.89 override, match:class .*

# disable blur for all xwayland apps
# windowrule = no_blur on, match:xwayland 1

# comment to set transparency globally
windowrule = match:class .*, no_blur off
windowrule = match:class ^()$, match:title ^()$, no_blur off
windowrule = match:class ^(.*)$, opacity 0.85 0.85		

# sem transparência
windowrule = match:class ^(.*)$, opacity 1 override 1 override


#windowrule = match:class ^(kitty)$, no_blur off
#windowrule = match:class ^(kitty)$, opacity 0.90 0.90

# Browser opacity
windowrule = match:class ^(google-chrome)$, opacity 1 1
windowrule = match:class ^(firefox)$, opacity 1 1
windowrule = match:class ^(microsoft-edge)$, opacity 1 1

# blur quickshell
#layerrule = match:namespace quickshell:.*, ignore_alpha 0.50
#layerrule = match:namespace quickshell:.*, xray off

# apps floating, centered and resized
#windowrule = match:class ^(org.kde.dolphin)$, float on
#windowrule = match:class ^(org.kde.dolphin)$, size 1200 700
#windowrule = match:class ^(org.kde.dolphin)$, center on
# popups on dolphin
windowrule = match:class ^(org.kde.dolphin)$, match:title ^(Progress Dialog|File Already Exists|Copying|Moving|Deleting|Rename|Confirm|Properties|Error|Warning|Settings|Preferences).*$, size 500 300
windowrule = match:class ^(org.kde.dolphin)$, match:title ^(Progress Dialog|File Already Exists|Copying|Moving|Deleting|Rename|Confirm|Properties|Error|Warning|Settings|Preferences).*$, center on

#windowrule = match:class ^(kitty)$, float on
#windowrule = match:class ^(kitty)$, size 1000 600
#windowrule = match:class ^(kitty)$, center on
#windowrule = match:class ^(kitty)$, opacity 0.89 override 0.89 override
#windowrule = match:class ^(kitty)$, no_blur on

windowrule = match:class ^(firefox)$, float on
windowrule = match:class ^(firefox)$, size 1000 600
windowrule = match:class ^(firefox)$, center on

#windowrule = match:class ^(microsoft-edge)$, float on
#windowrule = match:class ^(microsoft-edge)$, size 1000 600
#windowrule = match:class ^(microsoft-edge)$, center on

#windowrule = match:class ^(google-chrome)$, float on
#windowrule = match:class ^(google-chrome)$, size 1000 600

# edge
windowrule = match:title ^(New InPrivate tab.*)$, float on
windowrule = match:title ^(New InPrivate tab.*)$, size 1000 600
windowrule = match:title ^(New InPrivate tab.*)$, center on

# google
windowrule = match:title ^(New Incognito Tab.*)$, float on
windowrule = match:title ^(New Incognito Tab.*)$, size 1000 600
windowrule = match:title ^(New Incognito Tab.*)$, center on

# zen
#windowrule = match:title ^(Zen Browser Private Browsing.*)$, float on
#windowrule = match:title ^(Zen Browser Private Browsing.*)$, size 1000 600
#windowrule = match:title ^(Zen Browser Private Browsing.*)$, center on

windowrule = match:class ^(ij-ImageJ)$, float on

windowrule = match:class: ^(steam)$, float on

# workspaces
workspace = special:notas, on-created-empty:obsidian
workspace = special:todo, on-created-empty:notion-app
workspace = special:spotify, on-created-empty:spotify

#windowrule = match:class ^(obsidian)$, float on
#windowrule = match:class ^(obsidian)$, size 1000 600
#windowrule = match:class ^(obsidian)$, center on

# Zathura
windowrule = match:class ^(org.pwmt.zathura)$, float on
windowrule = match:class ^(org.pwmt.zathura)$, size 460 650

windowrule = match:class ^(Zotero)$, float off

# Gwenview
windowrule = match:class ^(org.kde.gwenview)$, float on

# Comment to set transparency on browsers
#windowrule = match:class ^(microsoft-edge)$, opacity 1.0 override 1.0 override
#windowrule = match:class ^(google-chrome)$, opacity 1.0 override 1.0 override
#windowrule = match:class ^(firefox)$,opacity 1.0 override 1.0 override

windowrule = match:class ^(Ds9.tcl)$, opacity 1 1
